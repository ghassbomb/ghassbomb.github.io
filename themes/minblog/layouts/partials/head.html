<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="author" content="{{ .Site.Author.name }}" />
{{ if .Description }}
<meta name="description" content="{{ .Description }}" />
{{ else if and .IsPage .Summary }}
<meta name="description" content="{{ .Summary }}" />
{{ else }}
<meta name="description" content="{{ .Site.Params.description }}" />
{{ end }}
<link rel="canonical" href="{{ .Permalink }}" />
{{ if .IsHome }}
<title>{{ .Site.Title }}</title>
{{ else }}
<title>{{ .Title }} - {{ .Site.Title }}</title>
{{ end }}
<link
  rel="apple-touch-icon"
  sizes="180x180"
  href='{{ "/favicons/apple-touch-icon.png" | absURL }}'
/>
<link rel="icon" href='{{ "/favicons/favicon.svg" | absURL }}'>
<link rel=”mask-icon” href='{{ "/favicons/safari-pinned-tab.svg" | absURL }}' color="#000000">
<link rel="manifest" href='{{ "/favicons/site.webmanifest" | absURL }}' />
<link media="screen" rel="stylesheet" href='{{ "css/main.css" | absURL }}' />
{{ template "_internal/google_analytics.html" . }}
