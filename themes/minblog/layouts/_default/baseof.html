<!doctype html>
<html>
  <head>
    {{- partial "head.html" . -}}
  </head>
  <body>
    <input type="checkbox" class="sidebar-checkbox" id="sidebar-checkbox" />
    {{- partial "sidebar.html" . -}}
    <div class="container">
      <header>{{- partial "header.html" . -}}</header>
      <main>{{- block "main" . }}{{- end }}</main>
    </div>
    <label for="sidebar-checkbox" class="sidebar-toggle"></label>
  </body>
</html>
