baseURL = "https://ghassbomb.github.io/"
languageCode = "en-us"
title = "Ghassan Shahzad"
theme = "cactus"

# summaryLength = 2

# Main menu which appears below site header.
[[menu.main]]
name = "Home"
url = "/"
weight = 1

[[menu.main]]
name = "Writings"
url = "/posts"
weight = 2

[[menu.main]]
name = "Books"
url = "/books"
weight = 3

[[menu.main]]
name = "Philosophy"
url = "/philosophy"
weight = 4

[[menu.main]]
